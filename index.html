<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>게임지표 용어 던전</title><style>
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:radial-gradient(circle at top,#26314f,#111827 55%,#090d17);color:#f8fafc;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}.wrap{width:min(760px,100%)}.panel{background:rgba(15,23,42,.95);border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:24px;box-shadow:0 18px 60px rgba(0,0,0,.35)}h1{margin:0 0 6px;font-size:clamp(26px,6vw,42px)}.sub{color:#a5b4fc;margin-bottom:20px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}.stat{background:#1e293b;padding:12px;border-radius:14px;text-align:center}.stat b{display:block;font-size:20px;margin-top:4px}.bar{height:10px;background:#1e293b;border-radius:999px;overflow:hidden;margin:14px 0 22px}.bar div{height:100%;width:0;background:linear-gradient(90deg,#60a5fa,#a78bfa);transition:.3s}.card{background:#0f172a;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:22px;min-height:180px}.label{color:#93c5fd;font-weight:700;font-size:14px}.question{font-size:clamp(20px,4.7vw,30px);line-height:1.35;margin:12px 0 18px}.choices{display:grid;gap:10px}button{width:100%;border:0;border-radius:14px;padding:15px 16px;font-size:17px;font-weight:800;cursor:pointer;transition:.18s;background:#334155;color:white;text-align:left}button:hover{transform:translateY(-2px);background:#475569}button.correct{background:#15803d}button.wrong{background:#b91c1c}button:disabled{cursor:default;opacity:.94}.primary{background:linear-gradient(90deg,#2563eb,#7c3aed);text-align:center}.secondary{background:#1e293b;text-align:center}.feedback{min-height:56px;margin-top:14px;line-height:1.45;color:#dbeafe}.hidden{display:none}.result{text-align:center}.result .big{font-size:54px;margin:12px 0}.mistakes{text-align:left;margin-top:20px;max-height:280px;overflow:auto}.mistake{background:#111827;border-radius:12px;padding:12px;margin:8px 0;border-left:4px solid #f59e0b}.footer{color:#94a3b8;text-align:center;font-size:13px;margin-top:14px}@media(max-width:560px){.stats{grid-template-columns:repeat(2,1fr)}.panel{padding:17px}}
</style></head><body><div class="wrap"><div class="panel">
<div id="startScreen"><h1>🎮 게임지표 용어 던전</h1><div class="sub">용어를 맞히며 던전을 클리어하자.</div><div class="card"><div class="question">게임 방식</div><p>• 총 15문제<br>• 목숨 3개<br>• 연속 정답 시 콤보 증가<br>• 틀린 문제는 종료 후 다시 복습</p><button class="primary" id="startBtn">게임 시작</button><button class="secondary" id="reviewBtn" style="margin-top:10px">용어 카드 보기</button></div></div>
<div id="gameScreen" class="hidden"><div class="stats"><div class="stat">점수<b id="score">0</b></div><div class="stat">목숨<b id="lives">❤️❤️❤️</b></div><div class="stat">콤보<b id="combo">0</b></div><div class="stat">문제<b><span id="qnum">1</span>/<span id="qtotal">15</span></b></div></div><div class="bar"><div id="progress"></div></div><div class="card"><div class="label" id="modeLabel"></div><div class="question" id="question"></div><div class="choices" id="choices"></div><div class="feedback" id="feedback"></div><button class="primary hidden" id="nextBtn">다음 문제</button></div></div>
<div id="resultScreen" class="hidden result"><h1>던전 결과</h1><div class="big" id="resultEmoji">🏆</div><div class="question" id="resultText"></div><p id="resultScore"></p><div id="mistakeBox" class="mistakes"></div><button class="primary" id="retryBtn">다시 도전</button><button class="secondary" id="reviewMistakesBtn" style="margin-top:10px">틀린 문제만 복습</button></div>
<div id="reviewScreen" class="hidden"><h1>📚 용어 카드</h1><div class="sub">카드를 눌러 뜻을 확인해.</div><div id="cards"></div><button class="secondary" id="backBtn" style="margin-top:14px">처음으로</button></div><div class="footer">게임지표 수업 필기 기반 학습용</div></div></div>
<script>const TERMS=[{"term": "DAU", "full": "Daily Active Users", "meaning": "하루 동안 게임에 접속한 중복되지 않은 이용자 수"}, {"term": "MAU", "full": "Monthly Active Users", "meaning": "한 달 동안 게임에 접속한 중복되지 않은 이용자 수"}, {"term": "NRU", "full": "New Registered Users", "meaning": "새로 가입하거나 게임을 처음 시작한 신규 유저 수"}, {"term": "PU", "full": "Paying User", "meaning": "하루 동안 결제한 중복되지 않은 유저 수"}, {"term": "NPU", "full": "New Paying User", "meaning": "게임에서 처음으로 결제한 유저 수"}, {"term": "MPU", "full": "Monthly Paying User", "meaning": "한 달 동안 결제한 중복되지 않은 유저 수"}, {"term": "PUR", "full": "Paying User Rate", "meaning": "DAU 중 결제한 유저의 비율"}, {"term": "MPUR", "full": "Monthly Paying User Rate", "meaning": "MAU 중 한 달 동안 결제한 유저의 비율"}, {"term": "ARPPU", "full": "Average Revenue Per Paying User", "meaning": "결제 유저 1명당 평균 결제 금액"}, {"term": "ARPDAU", "full": "Average Revenue Per Daily Active User", "meaning": "하루 이용자 1명당 평균 매출"}, {"term": "Retention", "full": "Retention", "meaning": "신규 유저가 며칠 뒤에도 다시 접속하는 비율"}, {"term": "Organic", "full": "Organic User", "meaning": "광고나 마케팅 없이 자연스럽게 유입된 유저"}, {"term": "Non-Organic", "full": "Non-Organic User", "meaning": "광고나 마케팅을 통해 유입된 유저"}, {"term": "CU", "full": "Concurrent User", "meaning": "현재 같은 시간에 접속해 있는 동시접속자 수"}, {"term": "MCU", "full": "Maximum Concurrent User", "meaning": "일정 기간 동안 기록한 최고 동시접속자 수"}, {"term": "UV", "full": "Unique Visit", "meaning": "중복을 제외한 순방문자 수"}, {"term": "TS", "full": "Time Spent", "meaning": "유저가 게임을 이용한 시간"}, {"term": "KPI", "full": "Key Performance Indicator", "meaning": "목표 달성을 판단하는 핵심 성과 지표"}, {"term": "LTV", "full": "Life Time Value", "meaning": "유저 1명이 완전히 이탈할 때까지 만들어 내는 가치"}, {"term": "PLC", "full": "Product Life Cycle", "meaning": "게임이나 제품의 수명주기"}, {"term": "BEP", "full": "Break Even Point", "meaning": "누적 비용과 누적 수익이 같아지는 손익분기점"}, {"term": "ROI", "full": "Return On Investment", "meaning": "투자한 금액 대비 얻은 이익의 비율"}, {"term": "CAC/UAC", "full": "Customer/User Acquisition Cost", "meaning": "유저 1명을 새로 확보하는 데 필요한 비용"}, {"term": "CRC", "full": "Customer Retention Cost", "meaning": "기존 유저 1명을 유지하는 데 필요한 비용"}, {"term": "RS", "full": "Revenue Share", "meaning": "개발사와 퍼블리셔 사이의 수익 분배 비율"}, {"term": "LF", "full": "License Fee", "meaning": "퍼블리셔가 판권을 받으며 개발사에 지급하는 계약금"}, {"term": "MG", "full": "Minimum Guarantee", "meaning": "개발사의 최소 수익 보장을 위해 미리 지급하는 금액"}, {"term": "MOU", "full": "Memorandum of Understanding", "meaning": "정식 계약 전에 협력 내용을 정리한 양해각서"}, {"term": "Gross Sales", "full": "Gross Sales", "meaning": "수수료와 세금 등을 빼기 전 총매출"}, {"term": "Net Sales", "full": "Net Sales", "meaning": "수수료와 세금 등을 제외한 뒤의 순매출"}];let questions=[],idx=0,score=0,lives=3,combo=0,mistakes=[],locked=false;const $=id=>document.getElementById(id);const shuffle=a=>[...a].sort(()=>Math.random()-.5);function showOnly(id){["startScreen","gameScreen","resultScreen","reviewScreen"].forEach(x=>$(x).classList.add("hidden"));$(id).classList.remove("hidden")}function makeQuestion(t){const reverse=Math.random()<.35,distractors=shuffle(TERMS.filter(x=>x.term!==t.term)).slice(0,3),options=shuffle([t,...distractors]);return{term:t.term,full:t.full,meaning:t.meaning,reverse,prompt:reverse?`${t.term}의 뜻은?`:t.meaning,answer:reverse?t.meaning:t.term,options:options.map(x=>reverse?x.meaning:x.term)}}function startGame(source=TERMS){const pool=source.length>=15?shuffle(source).slice(0,15):shuffle(source);questions=pool.map(makeQuestion);idx=0;score=0;lives=3;combo=0;mistakes=[];locked=false;showOnly("gameScreen");render()}function render(){const q=questions[idx];$("score").textContent=score;$("lives").textContent="❤️".repeat(lives)+"🖤".repeat(3-lives);$("combo").textContent=combo;$("qnum").textContent=idx+1;$("qtotal").textContent=questions.length;$("progress").style.width=`${idx/questions.length*100}%`;$("modeLabel").textContent=q.reverse?"용어를 보고 뜻 맞히기":"뜻을 보고 용어 맞히기";$("question").textContent=q.prompt;$("feedback").innerHTML="";$("nextBtn").classList.add("hidden");locked=false;const box=$("choices");box.innerHTML="";q.options.forEach(opt=>{const b=document.createElement("button");b.textContent=opt;b.onclick=()=>answer(b,opt);box.appendChild(b)})}function answer(btn,selected){if(locked)return;locked=true;const q=questions[idx],buttons=[...$("choices").querySelectorAll("button")];buttons.forEach(b=>b.disabled=true);if(selected===q.answer){btn.classList.add("correct");combo++;const gained=100+Math.min(combo-1,5)*20;score+=gained;$("feedback").innerHTML=`✅ 정답! <b>${q.term}</b> = ${q.meaning}<br>+${gained}점`}else{btn.classList.add("wrong");combo=0;lives--;const correctBtn=buttons.find(b=>b.textContent===q.answer);if(correctBtn)correctBtn.classList.add("correct");mistakes.push(q);$("feedback").innerHTML=`❌ 정답은 <b>${q.answer}</b><br>${q.term} = ${q.meaning}`}$("score").textContent=score;$("lives").textContent="❤️".repeat(lives)+"🖤".repeat(3-lives);$("combo").textContent=combo;$("nextBtn").classList.remove("hidden");$("nextBtn").textContent=idx===questions.length-1||lives<=0?"결과 보기":"다음 문제"}function nextQuestion(){if(idx===questions.length-1||lives<=0)return finish();idx++;render()}function finish(){showOnly("resultScreen");const cleared=lives>0&&idx===questions.length-1;$("resultEmoji").textContent=cleared?"🏆":"💀";$("resultText").textContent=cleared?"던전 클리어!":"다시 도전하면 된다!";$("resultScore").textContent=`최종 점수: ${score}점 · 오답: ${mistakes.length}개`;const box=$("mistakeBox");if(!mistakes.length){box.innerHTML='<div class="mistake">완벽해! 틀린 문제가 없어.</div>';$("reviewMistakesBtn").classList.add("hidden")}else{const unique=[...new Map(mistakes.map(x=>[x.term,x])).values()];box.innerHTML=unique.map(x=>`<div class="mistake"><b>${x.term}</b> — ${x.meaning}<br><small>${x.full}</small></div>`).join("");$("reviewMistakesBtn").classList.remove("hidden")}}function showCards(list=TERMS){showOnly("reviewScreen");const box=$("cards");box.innerHTML="";list.forEach(t=>{const b=document.createElement("button");b.style.marginBottom="9px";b.innerHTML=`<b>${t.term}</b><span style="display:block;font-size:13px;color:#cbd5e1;margin-top:4px">${t.full}</span>`;let open=false;b.onclick=()=>{open=!open;b.innerHTML=open?`<b>${t.term}</b><span style="display:block;font-size:14px;color:#dbeafe;margin-top:7px">${t.meaning}</span>`:`<b>${t.term}</b><span style="display:block;font-size:13px;color:#cbd5e1;margin-top:4px">${t.full}</span>`};box.appendChild(b)})}$("startBtn").onclick=()=>startGame();$("nextBtn").onclick=nextQuestion;$("retryBtn").onclick=()=>startGame();$("reviewBtn").onclick=()=>showCards();$("backBtn").onclick=()=>showOnly("startScreen");$("reviewMistakesBtn").onclick=()=>{const unique=[...new Map(mistakes.map(x=>[x.term,x])).values()];if(unique.length)startGame(unique)};</script></body></html>
